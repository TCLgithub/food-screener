<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Screener · Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#fafaf8;color:#1a1714;font-size:14px;line-height:1.5}
.page{max-width:700px;margin:0 auto;padding:28px 16px 60px}
.logo{font-size:14px;color:#aaa;margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:6px}
.logo b{color:#e85d2f}.logo-dot{width:7px;height:7px;border-radius:50%;background:#e85d2f;display:inline-block}
h1{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:6px;line-height:1.25;letter-spacing:-0.01em}
.meta{font-size:12px;color:#aaa;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.back-btn{margin-left:auto;font-size:11px;font-weight:700;color:#e85d2f;background:#fdf1ec;border:1px solid #f5c4a8;border-radius:8px;padding:5px 12px;text-decoration:none;white-space:nowrap}
.back-btn:hover{background:#e85d2f;color:#fff;border-color:#e85d2f}
.list{display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:14px;padding:16px;display:flex;gap:12px;transition:border-color 0.15s,box-shadow 0.15s}
.card:hover{border-color:#f5c4a8;box-shadow:0 4px 18px rgba(232,93,47,0.08)}
.num{font-weight:800;font-size:18px;color:#e0ddd8;min-width:26px;padding-top:1px;flex-shrink:0}
.body{flex:1;min-width:0}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:3px}
.name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;min-width:0}
.name-row a.rest-name{font-weight:700;font-size:15px;color:#1a1714;text-decoration:none;line-height:1.3}
.name-row a.rest-name:hover{color:#e85d2f}
.maps-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:#e85d2f;background:#fdf1ec;border:1px solid #f5c4a8;border-radius:6px;padding:3px 9px;text-decoration:none;white-space:nowrap;flex-shrink:0}
.maps-btn:hover{background:#e85d2f;color:#fff;border-color:#e85d2f}
.rating{display:flex;align-items:center;gap:4px;flex-shrink:0}
.rating .val{font-weight:800;font-size:15px;letter-spacing:-0.02em}
.rating .star{color:#f5b942;font-size:13px}
.rating .ct{font-size:11px;color:#aaa}
.addr{font-size:12px;color:#7a756e;margin-bottom:8px;line-height:1.4}
.chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:0.04em}
.chip-tag{background:#f7f5f0;border:1px solid #e8e6e0;color:#7a756e;text-transform:uppercase}
.chip-price{color:#c44821;font-weight:800;font-size:12px;letter-spacing:0}
.chip-dist{color:#e85d2f;background:#fdf1ec;border:1px solid #f5c4a8}
.chip-open{color:#2d8a4e;font-weight:700}
.chip-closed{color:#aaa}
.foot{margin-top:40px;padding-top:20px;border-top:1px solid #e8e6e0;text-align:center;font-size:12px;color:#bbb}
.foot a{color:#e85d2f;text-decoration:none;font-weight:600}
.error{text-align:center;padding:60px 20px;color:#aaa}
.error h2{font-size:20px;color:#ccc;margin-bottom:8px}
@media(max-width:500px){
  h1{font-size:19px}.card{padding:13px;gap:9px}
  .top{flex-direction:column;gap:5px}.rating{align-self:flex-start}
  .meta{gap:8px}
}
</style>
</head>
<body>
<div class="page">
  <div class="logo"><span class="logo-dot"></span>Food<b>Screener</b></div>
  <div id="content"><div class="error"><h2>Loading...</h2></div></div>
  <div class="foot">Generated by <a href="/" target="_blank">Food Screener</a></div>
</div>
<script>
function eh(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render(data, title, date) {
  const now = date || new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const rows = data.map(function(r, i) {
    const maps = r.mapsUrl || ('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent((r.name||'') + ' ' + (r.address||'')));
    const price = r.priceLevel ? '$'.repeat(r.priceLevel) : '';
    const tags  = (r.cuisineTags||[]).slice(0,3).join(' · ');
    const rev   = r.userRatingsTotal ? '(' + Number(r.userRatingsTotal).toLocaleString() + ')' : '';
    const isOpen = r.status === 'Open';
    return '<div class="card">' +
      '<div class="num">' + (i+1) + '</div>' +
      '<div class="body">' +
        '<div class="top">' +
          '<div class="name-row">' +
            '<a class="rest-name" href="' + eh(maps) + '" target="_blank" rel="noopener">' + eh(r.name) + '</a>' +
            '<a class="maps-btn" href="' + eh(maps) + '" target="_blank" rel="noopener">' +
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
              'Maps' +
            '</a>' +
          '</div>' +
          '<div class="rating"><span class="val">' + (r.rating||0).toFixed(1) + '</span><span class="star">★</span><span class="ct">' + rev + '</span></div>' +
        '</div>' +
        '<div class="addr">' + eh(r.address||'') + '</div>' +
        '<div class="chips">' +
          (tags  ? '<span class="chip chip-tag">' + eh(tags) + '</span>' : '') +
          (price ? '<span class="chip chip-price">' + price + '</span>' : '') +
          (r.distance ? '<span class="chip chip-dist">' + eh(r.distance) + '</span>' : '') +
          (r.status && r.status !== 'Unknown' ? '<span class="chip ' + (isOpen?'chip-open':'chip-closed') + '">' + (isOpen?'● Open':'○ Closed') + '</span>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('\n');

  document.title = eh(title) + ' · Food Screener';
  document.getElementById('content').innerHTML =
    '<h1>' + eh(title) + '</h1>' +
    '<div class="meta">' +
      '<span>📅 ' + now + '</span>' +
      '<span>🍽 ' + data.length + ' restaurant' + (data.length!==1?'s':'') + '</span>' +
      '<span>⭐ 4.0+ · 100+ reviews</span>' +
      '<a class="back-btn" href="/">← Back to App</a>' +
    '</div>' +
    '<div class="list">' + rows + '</div>';
}

// Read data from sessionStorage (direct open) or ?d= param (shared link)
try {
  const params = new URLSearchParams(window.location.search);
  let decoded;

  if (params.get('src') === 'session') {
    // Opened directly from the app via sessionStorage
    const stored = sessionStorage.getItem('fsResults');
    if (!stored) throw new Error('No session data');
    decoded = JSON.parse(stored);
  } else {
    // Opened via shared link with ?d= encoded data
    const d = params.get('d');
    if (!d) throw new Error('No data');
    decoded = JSON.parse(decodeURIComponent(escape(atob(d))));
  }
  render(decoded.restaurants, decoded.title, decoded.date);
} catch(e) {
  document.getElementById('content').innerHTML =
    '<div class="error"><h2>No results to display</h2><p>This link may be invalid or expired. <a href="/" style="color:#e85d2f">Go back to the app</a>.</p></div>';
}
</script>
</body>
</html>
